<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<title>దేవాలయ విరాళం</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

#bgvideo {
    position:fixed;
    top:0; left:0;

    @page { margin:0; }

    body {
        margin:0;

        visibility:hidden;

<body>

<video autoplay muted loop id="bgvideo">
<source src="https://v.ftcdn.net/16/61/35/96/240_F_1661359658_5T8XR3sWFASPlYh4UW4EfMjXbrbUyalg_ST.mp4">
</video>

<!-- HOME -->
<div id="homePage" class="page active">
<div class="container">
<h2>🛕 ఓం శ్రీ చౌడేశ్వరి దేవియే నమః</h2>

<form id="donationForm">
<input type="text" id="receiptInput" placeholder="రసీదు సంఖ్య" required>
<input type="text" id="nameInput" placeholder="పేరు" required>
<input type="number" id="amountInput" placeholder="మొత్తం" required>
<button type="submit">SAVE</button>
</form>

<span onclick="showPage('historyPage')" style="cursor:pointer;color:#ffd54f;">
చరిత్ర చూడండి
</span>
</div>
</div>

<!-- RECEIPT -->
<div id="receiptPage" class="page">
<div class="receipt-box">
<h2>🛕 జ్యోతుల మహోత్సవం</h2>

<p class="receipt-print">రసీదు: <span id="resReceipt"></span></p>
<p class="name-print">పేరు: <span id="resName"></span></p>
<p class="amount-print">₹ <span id="resAmount"></span></p>
<p>తేదీ: <span id="resDate"></span></p>

<button onclick="window.print()">PRINT</button>
<br><br>

<span onclick="showPage('homePage')">HOME</span> |
<span onclick="showPage('historyPage')">HISTORY</span>

</div>
</div>

<!-- HISTORY -->
<div id="historyPage" class="page">
<div class="container" style="max-width:800px;">
<h2>చరిత్ర</h2>

<input type="text" id="searchInput" placeholder="search..." onkeyup="searchHistory()">

<table>
<thead>
<tr>
<th>Receipt</th>
<th>Name</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>
<tbody id="historyTableBody"></tbody>
</table>

<br>
<span onclick="showPage('homePage')">← BACK</span>
</div>
</div>

<script>

let donations = JSON.parse(localStorage.getItem("data")) || [];
let editMode = false;
let editReceipt = null;

function showPage(p){
document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
document.getElementById(p).classList.add('active');
if(p==="historyPage") loadHistory();
}

document.getElementById("donationForm").addEventListener("submit",function(e){
e.preventDefault();

let receipt = receiptInput.value.trim();
let name = nameInput.value;
let amount = parseInt(amountInput.value);

let date = new Date().toLocaleString('en-IN', {
    dateStyle: 'medium',
    timeStyle: 'short'
});

if(donations.some(d => d.receipt == receipt && d.receipt != editReceipt)){
    alert("duplicate receipt!");
    return;
}

if(editMode){
donations = donations.map(d=>{
if(d.receipt==editReceipt){
return {receipt,name,amount,date};
}
return d;
});
editMode=false;
}else{
donations.push({receipt,name,amount,date});
}

localStorage.setItem("data",JSON.stringify(donations));

resReceipt.textContent = receipt;
resName.textContent = name;
resAmount.textContent = amount;
resDate.textContent = date;

showPage("receiptPage");
this.reset();
});

function loadHistory(data=donations){
let html="";
if(data.length===0){
html="<tr><td colspan='4'>No data</td></tr>";
}

data.forEach(d=>{
html+=`
<tr>
<td>${d.receipt}</td>
<td>${d.name}</td>
<td>₹${d.amount}</td>
<td>
<button class="edit-btn" onclick="editEntry('${d.receipt}')">Edit</button>
<button class="del-btn" onclick="deleteEntry('${d.receipt}')">Del</button>
</td>
</tr>`;
});

historyTableBody.innerHTML=html;
}

function deleteEntry(r){
if(confirm("delete?")){
donations = donations.filter(d=>d.receipt!=r);
localStorage.setItem("data",JSON.stringify(donations));
loadHistory();
}
}

function editEntry(r){
let d = donations.find(x=>x.receipt==r);

receiptInput.value=d.receipt;
nameInput.value=d.name;
amountInput.value=d.amount;

editMode=true;
editReceipt=r;

showPage("homePage");
}

function searchHistory(){
let v = searchInput.value.toLowerCase();
let f = donations.filter(d=>d.name.toLowerCase().includes(v)||d.receipt.includes(v));
loadHistory(f);
}

</script>

</body>
</html>
